<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Code 掃描與儲存工具</title>
    
    <!-- 改用更穩定的 CDN 伺服器載入核心套件 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* 隱藏掃描器預設的紅色提示字等無用 UI */
        #reader__dashboard_section_csr span {
            color: red !important;
            display: none !important;
        }
        /* 自訂滾動條，讓介面更好看 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col items-center py-8 px-4">

    <div class="w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- 標題區塊 -->
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold flex items-center justify-center gap-2">
                <i data-lucide="qr-code"></i>
                QR Code 掃描器
            </h1>
            <p class="text-indigo-200 mt-2 text-sm">自動同步至 Google 試算表</p>
        </div>

        <div class="p-6">
            <!-- 掃描畫面區塊 -->
            <div class="mb-6 flex flex-col items-center">
                <div id="reader" class="w-full max-w-sm rounded-lg overflow-hidden border-4 border-indigo-100 bg-gray-100 aspect-square flex items-center justify-center relative">
                    <div id="reader-placeholder" class="text-gray-400 flex flex-col items-center text-center p-4">
                        <i data-lucide="camera" class="w-12 h-12 mb-2"></i>
                        <p>點擊下方按鈕開啟相機</p>
                    </div>
                </div>
                
                <div class="flex gap-4 mt-6">
                    <button id="btn-start" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-full font-medium transition-colors shadow-md active:scale-95">
                        <i data-lucide="play" class="w-4 h-4"></i> 開始掃描
                    </button>
                    <button id="btn-stop" class="flex items-center gap-2 bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-full font-medium transition-colors shadow-md active:scale-95 hidden">
                        <i data-lucide="square" class="w-4 h-4"></i> 停止掃描
                    </button>
                    <!-- 新增：隱藏的檔案上傳輸入框與按鈕 -->
                    <input type="file" id="file-input" accept="image/*" capture="environment" class="hidden">
                    <button id="btn-upload" class="flex items-center gap-2 bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-full font-medium transition-colors shadow-md active:scale-95">
                        <i data-lucide="camera" class="w-4 h-4"></i> 拍照/上傳
                    </button>
                </div>
            </div>

            <hr class="border-gray-200 my-8">

            <!-- 掃描結果列表區塊 -->
            <div>
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-gray-700 flex items-center gap-2">
                        <i data-lucide="list" class="w-5 h-5"></i> 掃描紀錄
                        <span id="item-count" class="bg-indigo-100 text-indigo-700 text-xs py-1 px-2 rounded-full">0</span>
                    </h2>
                    <div class="flex gap-2">
                        <button id="btn-clear" class="text-sm text-gray-500 hover:text-red-500 transition-colors flex items-center gap-1 px-2 py-1">
                            <i data-lucide="trash-2" class="w-4 h-4"></i> 清空畫面
                        </button>
                        <button id="btn-export" class="text-sm bg-gray-800 hover:bg-black text-white px-3 py-1.5 rounded-md transition-colors flex items-center gap-1 shadow-sm">
                            <i data-lucide="download" class="w-4 h-4"></i> 匯出 TXT
                        </button>
                    </div>
                </div>

                <!-- 空狀態提示 -->
                <div id="empty-state" class="text-center py-10 text-gray-400 border-2 border-dashed border-gray-200 rounded-xl">
                    <i data-lucide="inbox" class="w-10 h-10 mx-auto mb-2 opacity-50"></i>
                    <p>尚未掃描任何內容</p>
                </div>

                <!-- 列表容器 -->
                <ul id="result-list" class="space-y-3 max-h-80 overflow-y-auto pr-1 hidden">
                    <!-- Javascript 動態產生內容 -->
                </ul>
            </div>
        </div>
    </div>

    <!-- 浮動提示框 (Toast) -->
    <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg transition-all duration-300 opacity-0 translate-y-10 pointer-events-none z-50 flex items-center gap-2">
        <i data-lucide="info" class="w-5 h-5 text-indigo-300"></i>
        <span id="toast-message">提示訊息</span>
    </div>

    <!-- 自訂對話框 (Modal) -->
    <div id="modal-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-xl shadow-2xl max-w-sm w-full p-6 transform scale-95 transition-transform duration-300" id="modal-content">
            <h3 class="text-xl font-bold mb-2 text-gray-800" id="modal-title">提示</h3>
            <p class="text-gray-600 mb-6" id="modal-desc">訊息內容</p>
            <div class="flex justify-end gap-3">
                <button id="modal-cancel" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition-colors hidden">取消</button>
                <button id="modal-confirm" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors">確定</button>
            </div>
        </div>
    </div>

    <script>
        // 確保網頁元素都載入後才執行程式
        document.addEventListener('DOMContentLoaded', () => {
            try {
                // 初始化圖示
                lucide.createIcons();
            } catch (e) {
                console.warn("圖示載入失敗", e);
            }

            // === 你的 Google Apps Script 專屬 API 網址 ===
            const gasUrl = "https://script.google.com/macros/s/AKfycbxk8BxOgRMbIc4sUPamPTn2l9b1cUmoC_mxjqADpTOcmjpi4QPncFmWBwEzdO58s5I/exec";
            
            let html5QrCode = null;
            let scannedItems = []; 
            let isScanning = false;

            const readerElement = document.getElementById('reader');
            const readerPlaceholder = document.getElementById('reader-placeholder');
            const btnStart = document.getElementById('btn-start');
            const btnStop = document.getElementById('btn-stop');
            const btnUpload = document.getElementById('btn-upload'); // 新增
            const fileInput = document.getElementById('file-input'); // 新增
            const resultList = document.getElementById('result-list');
            const emptyState = document.getElementById('empty-state');
            const itemCount = document.getElementById('item-count');
            const btnClear = document.getElementById('btn-clear');
            const btnExport = document.getElementById('btn-export');
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');

            let toastTimeout;
            function showToast(message) {
                toastMessage.textContent = message;
                toast.classList.remove('opacity-0', 'translate-y-10');
                toast.classList.add('opacity-100', 'translate-y-0');
                clearTimeout(toastTimeout);
                toastTimeout = setTimeout(() => {
                    toast.classList.remove('opacity-100', 'translate-y-0');
                    toast.classList.add('opacity-0', 'translate-y-10');
                }, 3000);
            }

            function showModal(title, desc, onConfirm, showCancel = false, onCancel = null) {
                const overlay = document.getElementById('modal-overlay');
                const content = document.getElementById('modal-content');
                document.getElementById('modal-title').textContent = title;
                document.getElementById('modal-desc').textContent = desc;

                const btnConfirm = document.getElementById('modal-confirm');
                const btnCancel = document.getElementById('modal-cancel');

                overlay.classList.remove('hidden');
                setTimeout(() => {
                    overlay.classList.remove('opacity-0');
                    content.classList.remove('scale-95');
                }, 10);

                if (showCancel) btnCancel.classList.remove('hidden');
                else btnCancel.classList.add('hidden');

                const closeModal = () => {
                    overlay.classList.add('opacity-0');
                    content.classList.add('scale-95');
                    setTimeout(() => overlay.classList.add('hidden'), 300);
                    btnConfirm.removeEventListener('click', confirmHandler);
                    btnCancel.removeEventListener('click', cancelHandler);
                };

                const confirmHandler = () => { if (onConfirm) onConfirm(); closeModal(); };
                const cancelHandler = () => { if (onCancel) onCancel(); closeModal(); };

                btnConfirm.addEventListener('click', confirmHandler);
                btnCancel.addEventListener('click', cancelHandler);
            }

            function copyText(text) {
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text).then(() => showToast('已複製到剪貼簿！')).catch(() => fallbackCopy(text));
                } else {
                    fallbackCopy(text);
                }
            }

            function fallbackCopy(text) {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.opacity = "0";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast('已複製到剪貼簿！');
                } catch (err) {
                    showToast('複製失敗，請手動複製。');
                }
                textArea.remove();
            }

            function renderList() {
                itemCount.textContent = scannedItems.length;
                if (scannedItems.length === 0) {
                    emptyState.classList.remove('hidden');
                    resultList.classList.add('hidden');
                    return;
                }

                emptyState.classList.add('hidden');
                resultList.classList.remove('hidden');
                resultList.innerHTML = '';

                // 使用 slice() 複製陣列再反轉，提高舊版瀏覽器相容性
                scannedItems.slice().reverse().forEach((item, reverseIndex) => {
                    const index = scannedItems.length - 1 - reverseIndex;
                    const isUrl = item.text.startsWith('http://') || item.text.startsWith('https://');
                    
                    const li = document.createElement('li');
                    li.className = 'bg-white border border-gray-200 p-4 rounded-xl shadow-sm hover:shadow-md transition-shadow flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between animate-[fadeIn_0.3s_ease-out]';
                    
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'flex-1 min-w-0 w-full';
                    
                    const textEl = document.createElement('p');
                    textEl.className = 'text-gray-800 break-all font-medium';
                    textEl.textContent = item.text;
                    contentDiv.appendChild(textEl);

                    const badgesDiv = document.createElement('div');
                    badgesDiv.className = 'flex flex-wrap gap-2 mt-2 items-center';

                    const typeLabel = document.createElement('span');
                    typeLabel.className = isUrl 
                        ? 'inline-block text-[10px] uppercase font-bold tracking-wider text-blue-600 bg-blue-100 px-2 py-0.5 rounded'
                        : 'inline-block text-[10px] uppercase font-bold tracking-wider text-gray-500 bg-gray-100 px-2 py-0.5 rounded';
                    typeLabel.textContent = isUrl ? '連結' : '純文字';
                    badgesDiv.appendChild(typeLabel);

                    if (item.serial) {
                        const serialLabel = document.createElement('span');
                        serialLabel.className = 'inline-block text-[10px] font-bold tracking-wider text-green-700 bg-green-100 px-2 py-0.5 rounded border border-green-200';
                        serialLabel.textContent = `序號: ${item.serial}`;
                        badgesDiv.appendChild(serialLabel);
                    }

                    if (item.syncStatus === 'syncing') {
                        const syncLabel = document.createElement('span');
                        syncLabel.className = 'inline-block text-[10px] font-bold tracking-wider text-yellow-600 bg-yellow-100 px-2 py-0.5 rounded flex items-center gap-1';
                        syncLabel.innerHTML = '<i data-lucide="loader-2" class="w-3 h-3 animate-spin"></i> 同步中';
                        badgesDiv.appendChild(syncLabel);
                    } else if (item.syncStatus === 'failed') {
                        const syncLabel = document.createElement('span');
                        syncLabel.className = 'inline-block text-[10px] font-bold tracking-wider text-red-600 bg-red-100 px-2 py-0.5 rounded cursor-pointer hover:bg-red-200 flex items-center gap-1 transition-colors';
                        syncLabel.title = '點擊重試';
                        syncLabel.innerHTML = '<i data-lucide="rotate-cw" class="w-3 h-3"></i> 重試同步';
                        syncLabel.onclick = () => {
                            item.syncStatus = 'syncing';
                            renderList();
                            syncToSheet(item);
                        };
                        badgesDiv.appendChild(syncLabel);
                    }

                    contentDiv.appendChild(badgesDiv);

                    const actionsDiv = document.createElement('div');
                    actionsDiv.className = 'flex gap-2 w-full sm:w-auto justify-end mt-2 sm:mt-0';

                    const copyBtn = document.createElement('button');
                    copyBtn.className = 'p-2 text-gray-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors';
                    copyBtn.innerHTML = '<i data-lucide="copy" class="w-4 h-4"></i>';
                    copyBtn.onclick = () => copyText(item.text);
                    actionsDiv.appendChild(copyBtn);

                    if (isUrl) {
                        const openBtn = document.createElement('button');
                        openBtn.className = 'p-2 text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors';
                        openBtn.innerHTML = '<i data-lucide="external-link" class="w-4 h-4"></i>';
                        openBtn.onclick = () => window.open(item.text, '_blank');
                        actionsDiv.appendChild(openBtn);
                    }

                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors';
                    deleteBtn.innerHTML = '<i data-lucide="x" class="w-4 h-4"></i>';
                    deleteBtn.onclick = () => {
                        scannedItems.splice(index, 1);
                        renderList();
                    };
                    actionsDiv.appendChild(deleteBtn);

                    li.appendChild(contentDiv);
                    li.appendChild(actionsDiv);
                    resultList.appendChild(li);
                });

                try { lucide.createIcons(); } catch(e) {}
            }

            async function syncToSheet(item) {
                try {
                    const response = await fetch(gasUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ link: item.text })
                    });
                    
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        item.syncStatus = 'success';
                        item.serial = result.serial;
                        showToast(`已同步並取得序號: ${result.serial}`);
                    } else {
                        item.syncStatus = 'failed';
                        showToast(`同步失敗: ${result.message || '未知錯誤'}`);
                    }
                } catch (err) {
                    item.syncStatus = 'failed';
                    showToast('同步失敗，請檢查網路狀態');
                }
                renderList();
            }

            function handleScanSuccess(decodedText) {
                if (isScanning && !scannedItems.some(item => item.text === decodedText)) {
                    const newItem = { text: decodedText, serial: null, syncStatus: 'syncing' };
                    scannedItems.push(newItem);
                    renderList();
                    
                    readerElement.classList.add('border-green-500');
                    readerElement.classList.remove('border-indigo-100');
                    
                    try {
                        const ctx = new (window.AudioContext || window.webkitAudioContext)();
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(800, ctx.currentTime);
                        osc.connect(ctx.destination);
                        osc.start();
                        osc.stop(ctx.currentTime + 0.1);
                    } catch (e) { }

                    setTimeout(() => {
                        readerElement.classList.remove('border-green-500');
                        readerElement.classList.add('border-indigo-100');
                    }, 500);

                    syncToSheet(newItem);
                }
            }

            async function startCamera() {
                try {
                    if (typeof Html5Qrcode === 'undefined') {
                        showModal('載入錯誤', '掃描套件尚未載入完成，請確認網路連線後重新整理網頁。');
                        return;
                    }

                    if (!html5QrCode) {
                        html5QrCode = new Html5Qrcode("reader");
                    }

                    readerPlaceholder.classList.add('hidden');
                    
                    await html5QrCode.start(
                        { facingMode: "environment" },
                        { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 },
                        handleScanSuccess,
                        () => {}
                    );

                    isScanning = true;
                    btnStart.classList.add('hidden');
                    btnStop.classList.remove('hidden');
                    readerElement.classList.replace('border-indigo-100', 'border-indigo-500');
                    
                } catch (err) {
                    readerPlaceholder.classList.remove('hidden');
                    showModal('相機錯誤', '無法開啟相機。請確認您已授予瀏覽器相機權限。');
                }
            }

            async function stopCamera() {
                if (html5QrCode && isScanning) {
                    try {
                        await html5QrCode.stop();
                        isScanning = false;
                        btnStop.classList.add('hidden');
                        btnStart.classList.remove('hidden');
                        readerPlaceholder.classList.remove('hidden');
                        readerElement.classList.replace('border-indigo-500', 'border-indigo-100');
                    } catch (err) {}
                }
            }

            // --- 新增：處理靜態照片/相機拍照邏輯 ---
            btnUpload.addEventListener('click', () => {
                fileInput.click();
            });

            fileInput.addEventListener('change', async (e) => {
                if (e.target.files.length === 0) return;
                
                // 如果正在錄影掃描，先關閉它
                if (isScanning) {
                    await stopCamera();
                }

                const file = e.target.files[0];
                if (!html5QrCode) {
                    html5QrCode = new Html5Qrcode("reader");
                }

                try {
                    // 掃描選擇的圖片
                    const decodedText = await html5QrCode.scanFile(file, true);
                    
                    // 暫時將 isScanning 設為 true 讓 handleScanSuccess 可以通行
                    isScanning = true; 
                    handleScanSuccess(decodedText);
                    isScanning = false;
                    
                } catch (err) {
                    showModal('辨識失敗', '圖片中找不到清晰的 QR Code，請換一張或重新拍攝。');
                }
                
                // 清空 input 讓下次選同一張圖也能觸發
                fileInput.value = '';
            });

            btnStart.addEventListener('click', startCamera);
            btnStop.addEventListener('click', stopCamera);

            btnClear.addEventListener('click', () => {
                if (scannedItems.length === 0) return;
                showModal('清空確認', '確定要刪除畫面上的掃描紀錄嗎？(試算表內的資料不會被刪除)', () => {
                    scannedItems = [];
                    renderList();
                    showToast('畫面紀錄已清空');
                }, true);
            });

            btnExport.addEventListener('click', () => {
                if (scannedItems.length === 0) {
                    showModal('提示', '目前沒有任何資料可以匯出。');
                    return;
                }
                
                const textContent = scannedItems.map(item => {
                    return item.serial ? `[${item.serial}] ${item.text}` : item.text;
                }).join('\n');
                
                const blob = new Blob([textContent], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                
                const now = new Date();
                const dateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
                a.download = `QR_Scan_${dateStr}.txt`;
                
                a.click();
                URL.revokeObjectURL(url);
                showToast('檔案已匯出');
            });

            // 加入漸顯動畫 style
            const style = document.createElement('style');
            style.textContent = `
                @keyframes fadeIn {
                    from { opacity: 0; transform: translateY(10px); }
                    to { opacity: 1; transform: translateY(0); }
                }
            `;
            document.head.appendChild(style);
        });
    </script>
</body>
</html>
