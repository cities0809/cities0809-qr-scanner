<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 卡片掃描與文字辨識系統</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Html5Qrcode (QR掃描) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <!-- Tesseract.js (OCR 文字辨識) -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        #reader__dashboard_section_csr span { display: none !important; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        /* 隱藏預設的影片邊框，用自訂的卡片框取代 */
        #reader video { object-fit: cover; border-radius: 0.5rem; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col items-center py-6 px-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-gradient-to-r from-slate-800 to-slate-700 p-5 text-white text-center">
            <h1 class="text-xl font-bold flex items-center justify-center gap-2">
                <i data-lucide="scan-line"></i>
                三國機台卡片掃描器
            </h1>
            <p class="text-slate-300 mt-1 text-xs">QR 碼 + AI 繁體中文辨識</p>
        </div>

        <div class="p-5">
            <!-- OCR 載入進度條 -->
            <div id="ocr-loading" class="hidden mb-4 p-3 bg-blue-50 border border-blue-100 rounded-lg flex items-center gap-3">
                <i data-lucide="loader-2" class="w-5 h-5 text-blue-500 animate-spin"></i>
                <div class="flex-1">
                    <p class="text-xs font-bold text-blue-800" id="ocr-status-text">正在初始化 AI 辨識引擎 (需下載繁中語系檔)...</p>
                    <div class="w-full bg-blue-200 rounded-full h-1.5 mt-1">
                        <div id="ocr-progress-bar" class="bg-blue-600 h-1.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- 掃描區塊：設定為 5.9 : 8.6 的比例 -->
            <div class="mb-5 flex flex-col items-center relative">
                <div class="w-full aspect-[59/86] max-w-[280px] rounded-xl overflow-hidden border-4 border-slate-200 bg-slate-100 relative shadow-inner">
                    <!-- 掃描器容器 -->
                    <div id="reader" class="w-full h-full absolute inset-0 flex items-center justify-center"></div>
                    
                    <!-- 卡片對齊導引框 -->
                    <div id="guide-frame" class="absolute inset-4 border-2 border-dashed border-white/70 rounded-lg pointer-events-none flex flex-col justify-between p-2 hidden z-10">
                        <div class="flex justify-end"><span class="bg-black/50 text-white text-[10px] px-1 rounded">武將名稱區</span></div>
                        <div class="flex justify-end"><span class="bg-black/50 text-white text-[10px] px-1 rounded">QR Code區</span></div>
                    </div>

                    <!-- 預設提示 -->
                    <div id="reader-placeholder" class="absolute inset-0 text-slate-400 flex flex-col items-center justify-center bg-slate-100 z-20">
                        <i data-lucide="camera" class="w-10 h-10 mb-2"></i>
                        <p class="text-sm font-medium">點擊下方開啟相機</p>
                    </div>
                </div>
                
                <div class="flex gap-3 mt-5 w-full max-w-[280px]">
                    <button id="btn-start" class="flex-1 flex justify-center items-center gap-2 bg-slate-800 hover:bg-slate-900 text-white py-3 rounded-xl font-medium transition-colors shadow-md active:scale-95">
                        <i data-lucide="camera" class="w-4 h-4"></i> 開啟相機
                    </button>
                    <button id="btn-stop" class="flex-1 flex justify-center items-center gap-2 bg-red-500 hover:bg-red-600 text-white py-3 rounded-xl font-medium transition-colors shadow-md active:scale-95 hidden">
                        <i data-lucide="square" class="w-4 h-4"></i> 停止
                    </button>
                </div>
            </div>

            <hr class="border-slate-100 my-6">

            <!-- 列表區塊 -->
            <div>
                <h2 class="text-sm font-bold text-slate-700 flex items-center justify-between mb-3">
                    <span class="flex items-center gap-2"><i data-lucide="list-checks" class="w-4 h-4"></i> 最新掃描結果</span>
                    <button id="btn-clear" class="text-xs text-red-500 hover:bg-red-50 px-2 py-1 rounded transition-colors">清空畫面</button>
                </h2>
                
                <ul id="result-list" class="space-y-3 max-h-60 overflow-y-auto pr-1">
                    <div id="empty-state" class="text-center py-6 text-slate-400 border border-dashed border-slate-200 rounded-lg text-sm">
                        尚未掃描任何卡片
                    </div>
                </ul>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-5 py-2.5 rounded-full shadow-lg transition-all duration-300 opacity-0 -translate-y-10 pointer-events-none z-50 flex items-center gap-2 text-sm whitespace-nowrap">
        <span id="toast-message">提示訊息</span>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();

            // ⚠️ 替換成你的 Google Apps Script 網址
            const gasUrl = "https://script.google.com/macros/s/AKfycbxk8BxOgRMbIc4sUPamPTn2l9b1cUmoC_mxjqADpTOcmjpi4QPncFmWBwEzdO58s5I/exec";
            
            let html5QrCode = null;
            let scannedItems = []; 
            let isScanning = false;
            let isProcessingOCR = false; // 防止連續觸發
            let tesseractWorker = null;

            const readerElement = document.getElementById('reader');
            const guideFrame = document.getElementById('guide-frame');
            const readerPlaceholder = document.getElementById('reader-placeholder');
            const btnStart = document.getElementById('btn-start');
            const btnStop = document.getElementById('btn-stop');
            const resultList = document.getElementById('result-list');
            const emptyState = document.getElementById('empty-state');
            
            // OCR UI
            const ocrLoadingBox = document.getElementById('ocr-loading');
            const ocrStatusText = document.getElementById('ocr-status-text');
            const ocrProgressBar = document.getElementById('ocr-progress-bar');
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');

            let toastTimeout;
            function showToast(message, isPersistent = false) {
                toastMessage.textContent = message;
                toast.classList.remove('opacity-0', '-translate-y-10');
                toast.classList.add('opacity-100', 'translate-y-0');
                
                clearTimeout(toastTimeout);
                if (!isPersistent) {
                    toastTimeout = setTimeout(() => {
                        toast.classList.remove('opacity-100', 'translate-y-0');
                        toast.classList.add('opacity-0', '-translate-y-10');
                    }, 3000);
                }
            }

            // 初始化 Tesseract.js (繁中)
            async function initOCR() {
                if (tesseractWorker) return true;
                try {
                    ocrLoadingBox.classList.remove('hidden');
                    // 建立 Tesseract Worker，並追蹤下載進度
                    tesseractWorker = await Tesseract.createWorker({
                        logger: m => {
                            if (m.status === 'recognizing text') {
                                ocrStatusText.textContent = "正在辨識圖片文字...";
                            } else {
                                ocrStatusText.textContent = "正在下載繁中語系庫 (僅需一次)...";
                            }
                            if (m.progress) {
                                ocrProgressBar.style.width = `${Math.round(m.progress * 100)}%`;
                            }
                        }
                    });
                    await tesseractWorker.loadLanguage('chi_tra');
                    await tesseractWorker.initialize('chi_tra');
                    
                    ocrLoadingBox.classList.add('hidden');
                    return true;
                } catch (err) {
                    console.error("OCR 初始化失敗:", err);
                    ocrStatusText.textContent = "OCR 引擎載入失敗，將僅使用 QR 掃描。";
                    ocrProgressBar.classList.add('bg-red-500');
                    setTimeout(() => ocrLoadingBox.classList.add('hidden'), 3000);
                    return false;
                }
            }

            function renderList() {
                if (scannedItems.length === 0) {
                    emptyState.style.display = 'block';
                    const items = resultList.querySelectorAll('.scan-item');
                    items.forEach(item => item.remove());
                    return;
                }
                emptyState.style.display = 'none';

                // 清除舊的清單重新渲染
                const items = resultList.querySelectorAll('.scan-item');
                items.forEach(item => item.remove());

                scannedItems.slice().reverse().forEach((item) => {
                    const li = document.createElement('li');
                    li.className = 'scan-item bg-white border border-slate-100 p-3 rounded-lg shadow-sm animate-[fadeIn_0.3s_ease-out] text-sm';
                    
                    let statusHtml = '';
                    if (item.syncStatus === 'syncing') {
                        statusHtml = `<span class="text-yellow-600 flex items-center gap-1 text-xs"><i data-lucide="loader-2" class="w-3 h-3 animate-spin"></i> 同步與辨識中</span>`;
                    } else if (item.syncStatus === 'success') {
                        statusHtml = `<span class="text-green-600 font-bold text-xs">[${item.serial}] 同步成功</span>`;
                    } else {
                        statusHtml = `<span class="text-red-500 text-xs">同步失敗</span>`;
                    }

                    li.innerHTML = `
                        <div class="flex justify-between items-start mb-1">
                            <div class="font-mono text-xs text-slate-400 truncate max-w-[150px]">${item.qrText}</div>
                            ${statusHtml}
                        </div>
                        <div class="bg-slate-50 p-2 rounded text-slate-700 font-medium text-xs break-all">
                            <span class="text-slate-400 text-[10px] block mb-0.5">試算表比對結果：</span>
                            ${item.extractedData || '等待結果...'}
                        </div>
                        <div class="mt-1 border-t border-slate-100 pt-1">
                            <span class="text-slate-400 text-[10px] block">AI 畫面辨識文字 (供參考)：</span>
                            <div class="text-[10px] text-slate-600 line-clamp-2 italic">${item.ocrRawText || '尚未辨識'}</div>
                        </div>
                    `;
                    resultList.appendChild(li);
                });
                lucide.createIcons();
            }

            async function syncToSheet(item) {
                try {
                    const response = await fetch(gasUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        // 同時傳送 QR 連結與 OCR 辨識出來的文字
                        body: JSON.stringify({ 
                            link: item.qrText,
                            ocrText: item.ocrRawText
                        })
                    });
                    
                    const result = await response.json();
                    if (result.status === 'success') {
                        item.syncStatus = 'success';
                        item.serial = result.serial;
                        item.extractedData = result.extracted; 
                    } else {
                        item.syncStatus = 'failed';
                    }
                } catch (err) {
                    item.syncStatus = 'failed';
                }
                renderList();
            }

            async function handleScanSuccess(decodedText) {
                // 如果正在處理上一張卡片，忽略新的掃描
                if (!isScanning || isProcessingOCR) return;
                
                if (!scannedItems.some(item => item.qrText === decodedText)) {
                    isProcessingOCR = true; // 上鎖
                    showToast('QR 已捕捉！正在擷取影像...', true);
                    
                    // 1. 捕捉當下的影片畫面 (畫布)
                    let ocrRawText = "";
                    try {
                        const video = document.querySelector('#reader video');
                        if (video && tesseractWorker) {
                            showToast('正在進行 AI 文字辨識...', true);
                            const canvas = document.createElement('canvas');
                            canvas.width = video.videoWidth;
                            canvas.height = video.videoHeight;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                            
                            // 2. 進行 OCR 辨識
                            const { data: { text } } = await tesseractWorker.recognize(canvas);
                            // 簡單清理文字 (去除多餘換行與空白)
                            ocrRawText = text.replace(/\s+/g, ' ').trim();
                        }
                    } catch (e) {
                        console.error("OCR 擷取失敗", e);
                        ocrRawText = "(文字辨識失敗)";
                    }

                    // 3. 建立資料並寫入列表
                    const newItem = { 
                        qrText: decodedText, 
                        ocrRawText: ocrRawText,
                        serial: null, 
                        syncStatus: 'syncing', 
                        extractedData: null 
                    };
                    scannedItems.push(newItem);
                    renderList();
                    
                    // 閃爍特效
                    guideFrame.classList.replace('border-white/70', 'border-green-500');
                    setTimeout(() => guideFrame.classList.replace('border-green-500', 'border-white/70'), 500);

                    showToast('辨識完成，同步中...');
                    
                    // 4. 同步至 Google Sheet
                    await syncToSheet(newItem);
                    
                    // 解鎖，允許掃描下一張
                    isProcessingOCR = false; 
                }
            }

            async function startCamera() {
                try {
                    btnStart.disabled = true;
                    // 先啟動 OCR 引擎 (背景下載語系)
                    await initOCR();

                    if (!html5QrCode) {
                        html5QrCode = new Html5Qrcode("reader");
                    }

                    readerPlaceholder.classList.add('hidden');
                    guideFrame.classList.remove('hidden');
                    
                    await html5QrCode.start(
                        { facingMode: "environment" },
                        { 
                            fps: 10, 
                            qrbox: { width: 200, height: 200 }, 
                            aspectRatio: 59/86 // 依照卡片比例設定相機
                        },
                        handleScanSuccess,
                        () => {}
                    );

                    isScanning = true;
                    btnStart.classList.add('hidden');
                    btnStart.disabled = false;
                    btnStop.classList.remove('hidden');
                    
                } catch (err) {
                    btnStart.disabled = false;
                    readerPlaceholder.classList.remove('hidden');
                    guideFrame.classList.add('hidden');
                    alert('無法開啟相機，請確認權限。');
                }
            }

            async function stopCamera() {
                if (html5QrCode && isScanning) {
                    try {
                        await html5QrCode.stop();
                        isScanning = false;
                        btnStop.classList.add('hidden');
                        btnStart.classList.remove('hidden');
                        readerPlaceholder.classList.remove('hidden');
                        guideFrame.classList.add('hidden');
                    } catch (err) {}
                }
            }

            btnStart.addEventListener('click', startCamera);
            btnStop.addEventListener('click', stopCamera);
            document.getElementById('btn-clear').addEventListener('click', () => {
                scannedItems = [];
                renderList();
            });
        });
    </script>
</body>
</html>
